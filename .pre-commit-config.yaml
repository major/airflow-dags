# Pre-commit hooks for airflow-dags.
#
# Setup (one-time):
#   pip install pre-commit
#   pre-commit install
#
# Run on demand:
#   pre-commit run --all-files
#
# Hooks run against every commit; install is required for that to take effect.
# CI integration is intentionally not wired up — this repo is a DAG bundle
# with no other CI today.
---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.411
    hooks:
      - id: pyright
